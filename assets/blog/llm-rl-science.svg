<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">The science of LLM reinforcement learning</title>
  <desc id="desc">Four connected questions form the learning loop from experience to policy update.</desc>
  <rect width="640" height="400" fill="#eeeae3"/>
  <text x="42" y="33" fill="#111" font-family="IBM Plex Mono, monospace" font-size="13" letter-spacing="2">THE LEARNING LOOP</text>
  <g fill="#fffefa" stroke="#111" stroke-width="3">
    <rect x="58" y="75" width="210" height="92"/><rect x="372" y="75" width="210" height="92"/>
    <rect x="372" y="233" width="210" height="92"/><rect x="58" y="233" width="210" height="92"/>
  </g>
  <g fill="none" stroke="#111" stroke-width="3">
    <path d="M268 121h104"/><path d="m359 108 14 13-14 13"/>
    <path d="M477 167v66"/><path d="m464 220 13 14 13-14"/>
    <path d="M372 279H268"/><path d="m281 266-14 13 14 13"/>
    <path d="M163 233v-66"/><path d="m150 180 13-14 13 14"/>
  </g>
  <g fill="#111" font-family="IBM Plex Mono, monospace">
    <text x="79" y="107" font-size="11">01 / EXPERIENCE</text><text x="79" y="139" font-size="17">What to generate?</text>
    <text x="393" y="107" font-size="11">02 / POLICY</text><text x="393" y="139" font-size="17">Who generated it?</text>
    <text x="393" y="265" font-size="11">03 / CREDIT</text><text x="393" y="297" font-size="17">Where to assign it?</text>
    <text x="79" y="265" font-size="11">04 / UPDATE</text><text x="79" y="297" font-size="17">How to learn?</text>
  </g>
  <g fill="#d97757"><circle cx="320" cy="121" r="7"/><circle cx="477" cy="200" r="7"/><circle cx="320" cy="279" r="7"/><circle cx="163" cy="200" r="7"/></g>
  <text x="598" y="370" fill="#111" font-family="IBM Plex Mono, monospace" font-size="11" text-anchor="end">REWARD → CREDIT → UPDATE</text>
</svg>
